name: Actualizar RSS FilmAffinity plataformas

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install requests beautifulsoup4
      - run: python fa_rss.py
      - name: Guardar feeds
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add feeds/*.xml
          git commit -m "Actualizar RSS plataformas" || echo "Sin cambios"
          git push
